services:
  - type: web
    name: calculator-mcp
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python combined_server.py
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BASE_URL
        sync: false  # Set to https://your-app.onrender.com
    healthCheckPath: /health
    autoDeploy: true
